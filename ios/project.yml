# XcodeGen project spec — run `xcodegen generate` in this directory.
name: AmITalkingTooMuch
options:
  bundleIdPrefix: com.davehedengren
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  VoiceCore:
    path: VoiceCore

targets:
  AmITalkingTooMuch:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - path: App/Resources
        buildPhase: resources
    dependencies:
      - package: VoiceCore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Am I Talking?
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: >-
          The app listens to the conversation to measure how much of the
          speaking time is yours. Audio is analyzed on-device and never
          stored or uploaded.
        NSLocationWhenInUseUsageDescription: >-
          Your location is used only to label a saved event with where it
          happened. It stays on your device and is never uploaded.
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Device code signing — persisted here so `xcodegen generate` doesn't
        # reset the team. Team IDs are not secret (they ship in every app's
        # embedded profile); move to a gitignored xcconfig if you'd rather.
        DEVELOPMENT_TEAM: G789J4SKQQ
        CODE_SIGN_STYLE: Automatic
